<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOSIBÉ Boutique</title>
  <style>
    :root {
      --rosa: #f7a8c4;
      --rosa-oscuro: #e0729e;
      --dorado: #c99a3c;
      --blanco: #ffffff;
      --gris: #8a8a8a;
      --fondo: #fff5f8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0; background: var(--fondo);
      min-height: 100vh; color: #333;
    }
    .centrado { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

    /* TARJETA LOGIN */
    .auth-card {
      background: var(--blanco);
      border-radius: 20px; padding: 36px 30px;
      box-shadow: 0 10px 40px rgba(224, 114, 158, 0.18);
      text-align: center; width: 100%; max-width: 380px;
    }
    .logo-box {
      width: 110px; height: 110px; margin: 0 auto 14px;
      border-radius: 50%; background: var(--blanco);
      border: 3px solid var(--rosa);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-size: 40px;
    }
    .logo-box img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 22px; margin: 4px 0 0; color: #1a1a1a; font-weight: 700; letter-spacing: 2px; }
    .eslogan {
      font-size: 11px; color: var(--dorado); letter-spacing: 1.5px;
      text-transform: uppercase; margin: 4px 0 16px; font-weight: 600;
    }
    .subtitulo { font-size: 13px; color: var(--gris); margin-bottom: 20px; }
    input, select {
      width: 100%; padding: 12px; margin-bottom: 12px;
      border: 1.5px solid #f0d5e0; border-radius: 10px; outline: none; font-size: 14px;
    }
    input:focus, select:focus { border-color: var(--rosa-oscuro); }
    .btn-principal {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--rosa), var(--rosa-oscuro));
      color: white; border: none; border-radius: 10px;
      font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px;
    }
    .btn-principal:hover { opacity: 0.9; }
    .btn-principal:disabled { opacity: 0.6; cursor: not-allowed; }
    .mensaje {
      font-size: 13px; padding: 10px; border-radius: 8px;
      margin-bottom: 15px; display: none; text-align: left;
    }
    .error { background: #fde5ec; color: #c0447a; display: block; }
    .ok { background: #e6f7ea; color: #2a8a4a; display: block; }
    .oculto { display: none !important; }
    .switch-modo { margin-top: 15px; font-size: 13px; color: var(--gris); }
    .switch-modo a { color: var(--rosa-oscuro); font-weight: 600; text-decoration: none; cursor: pointer; }

  </style>
</head>
<body>

  <div id="vistaAuth" class="centrado">
    <div class="auth-card">
      <div class="logo-box" id="logoWrap"><img src="assets/logo-sosibe.jpg" alt="Logo SOSIBÉ Boutique" onerror="this.onerror=null;this.src='assets/logo-sosibe.jpg';"></div>
      <h1 id="txtNombreTienda">SOSIBÉ Boutique</h1>
      <div class="eslogan" id="txtEslogan">Elegancia • Estilo • Confianza</div>
      <div class="subtitulo" id="txtSub">Ingresa a tu cuenta</div>

      <div id="msg" class="mensaje"></div>

      <div id="formLogin">
        <input type="text" id="lUser" placeholder="Usuario" autocomplete="username">
        <input type="password" id="lPass" placeholder="Contraseña" autocomplete="current-password">
        <button class="btn-principal" id="btnLogin" onclick="ejecutarLogin()">Ingresar</button>
        <div class="switch-modo">¿No tienes cuenta? <a onclick="toggle(true)">Crear usuario</a></div>
      </div>

      <div id="formReg" class="oculto">
        <input type="text" id="rNom" placeholder="Nombre completo">
        <input type="text" id="rUser" placeholder="Nombre de usuario">
        <input type="password" id="rPass" placeholder="Contraseña">
        <select id="rRol">
          <option value="Vendedor">Vendedor</option>
          <option value="Cajero">Cajero</option>
          <option value="Admin">Administrador</option>
        </select>
        <button class="btn-principal" id="btnReg" onclick="ejecutarRegistro()">Registrarme</button>
        <div class="switch-modo">¿Ya tienes cuenta? <a onclick="toggle(false)">Iniciar sesión</a></div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ Reemplaza esta URL por la de tu propia implementación de Apps Script (termina en /exec)
    const API_URL = 'https://script.google.com/macros/s/AKfycbwF0T4dFM_SbfCxq6dBBSdQBL_xP2R64RZFJW-ly0AGiEWuRvVrIHXV7AQ2WrchaT_W/exec';

    async function api(accion, params = {}, metodo = 'POST') {
      const url = metodo === 'GET' ? `${API_URL}?action=${accion}&${new URLSearchParams(params)}` : API_URL;
      const config = {
        method: metodo,
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: metodo === 'GET' ? undefined : JSON.stringify({ action: accion, ...params })
      };
      const res = await fetch(url, config);
      const json = await res.json();
      if (!json.ok) throw new Error(json.error);
      return json.data;
    }

    function toggle(esReg) {
      document.getElementById('formLogin').classList.toggle('oculto', esReg);
      document.getElementById('formReg').classList.toggle('oculto', !esReg);
      document.getElementById('txtSub').innerText = esReg ? 'Crea tu cuenta de vendedor' : 'Ingresa a tu cuenta';
      document.getElementById('msg').style.display = 'none';
    }

    function mostrarMensaje(texto, tipo) {
      const m = document.getElementById('msg');
      m.innerText = texto;
      m.className = 'mensaje ' + tipo;
    }

    async function ejecutarLogin() {
      const usuario = document.getElementById('lUser').value.trim();
      const password = document.getElementById('lPass').value;
      if (!usuario || !password) { mostrarMensaje('Escribe tu usuario y contraseña', 'error'); return; }
      const btn = document.getElementById('btnLogin');
      btn.disabled = true; btn.innerText = 'Ingresando...';
      try {
        const user = await api('login', { usuario, password });
        guardarSesion(user);
        window.location.href = 'dashboard.html';
      } catch (e) {
        mostrarMensaje(e.message, 'error');
        btn.disabled = false; btn.innerText = 'Ingresar';
      }
    }

    async function ejecutarRegistro() {
      const nombre = document.getElementById('rNom').value.trim();
      const usuario = document.getElementById('rUser').value.trim();
      const password = document.getElementById('rPass').value;
      const rol = document.getElementById('rRol').value;
      if (!nombre || !usuario || !password) { mostrarMensaje('Completa todos los campos', 'error'); return; }
      const btn = document.getElementById('btnReg');
      btn.disabled = true; btn.innerText = 'Creando...';
      try {
        await api('registrarUsuario', { nombre, usuario, password, rol });
        mostrarMensaje('¡Creado! Ya puedes entrar.', 'ok');
        toggle(false);
      } catch (e) {
        mostrarMensaje(e.message, 'error');
      } finally {
        btn.disabled = false; btn.innerText = 'Registrarme';
      }
    }

    function guardarSesion(u) {
      localStorage.setItem('pos_token', u.token);
      localStorage.setItem('pos_usuario', JSON.stringify(u));
    }

    function cerrarSesion() {
      const token = localStorage.getItem('pos_token');
      if (token) api('logoutSesion', { token }).catch(() => {});
      localStorage.removeItem('pos_token');
      localStorage.removeItem('pos_usuario');
      location.reload();
    }

    async function intentarSesionGuardada() {
      const token = localStorage.getItem('pos_token');
      if (!token) return;
      try {
        await api('validarSesion', { token }, 'GET');
        window.location.href = 'dashboard.html';
      } catch (e) {
        localStorage.removeItem('pos_token');
        localStorage.removeItem('pos_usuario');
      }
    }

    window.onload = async () => {
      try {
        const config = await api('getConfigPublica', {}, 'GET');
        if (config.nombreEmpresa) document.getElementById('txtNombreTienda').innerText = config.nombreEmpresa;
        if (config.logoUrl) document.getElementById('logoWrap').innerHTML = `<img src="${config.logoUrl}" alt="Logo" onerror="this.onerror=null;this.src='assets/logo-sosibe.jpg';">`;
      } catch (e) {
        console.error('Error cargando configuración:', e);
      }
      await intentarSesionGuardada();
    };
  </script>
</body>
</html>
