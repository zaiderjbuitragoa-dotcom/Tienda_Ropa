<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema POS - Mi Tienda de Ropa</title>
  <style>
    :root {
      --rosa: #f7a8c4;
      --rosa-oscuro: #e0729e;
      --blanco: #ffffff;
      --gris: #8a8a8a;
      --fondo: #fff5f8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: var(--fondo);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .auth-card {
      background: var(--blanco);
      border-radius: 20px;
      padding: 36px 30px;
      box-shadow: 0 10px 40px rgba(224, 114, 158, 0.18);
      text-align: center;
      width: 100%;
      max-width: 380px;
    }

    .logo-box {
      width: 96px; height: 96px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: var(--fondo);
      border: 3px solid var(--rosa);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; cursor: pointer;
    }
    .logo-box img { width: 100%; height: 100%; object-fit: cover; }
    
    h1 { font-size: 20px; margin: 4px 0; color: var(--rosa-oscuro); font-weight: 700; }
    .subtitulo { font-size: 13px; color: var(--gris); margin-bottom: 20px; }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1.5px solid #f0d5e0;
      border-radius: 10px;
      outline: none;
    }
    input:focus { border-color: var(--rosa-oscuro); }

    .btn-principal {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--rosa), var(--rosa-oscuro));
      color: white; border: none; border-radius: 10px;
      font-weight: 600; cursor: pointer;
    }
    .btn-principal:disabled { opacity: 0.6; }

    .mensaje {
      font-size: 13px; padding: 10px; border-radius: 8px;
      margin-bottom: 15px; display: none; text-align: left;
    }
    .error { background: #fde5ec; color: #c0447a; display: block; }
    .ok { background: #e6f7ea; color: #2a8a4a; display: block; }

    .oculto { display: none; }
    .switch-modo { margin-top: 15px; font-size: 13px; color: var(--gris); }
    .switch-modo a { color: var(--rosa-oscuro); text-decoration: none; font-weight: 600; cursor: pointer; }

    /* DASHBOARD */
    #vistaApp { max-width: 900px; width: 95%; }
    .topbar {
      background: white; padding: 15px; border-radius: 15px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
    th { background: var(--rosa); color: white; }
  </style>
</head>
<body>

  <!-- PANTALLA DE LOGIN / REGISTRO -->
  <div id="vistaAuth" class="auth-card">
    <div class="logo-box">
      <img id="logoImg" src="https://via.placeholder.com/100?text=👗" alt="Logo">
    </div>
    <h1 id="uiNombreTienda">Mi Tienda</h1>
    <div class="subtitulo" id="uiSubtitulo">Ingresa a tu cuenta</div>

    <div id="msgAuth" class="mensaje"></div>

    <!-- Formulario Login -->
    <div id="formLogin">
      <input type="text" id="logUser" placeholder="Usuario">
      <input type="password" id="logPass" placeholder="Contraseña">
      <button class="btn-principal" onclick="ejecutarLogin()">Ingresar</button>
      <div class="switch-modo">¿No tienes cuenta? <a onclick="cambiarVista(true)">Crear cuenta</a></div>
    </div>

    <!-- Formulario Registro -->
    <div id="formReg" class="oculto">
      <input type="text" id="regNom" placeholder="Nombre completo">
      <input type="text" id="regUser" placeholder="Nombre de usuario">
      <input type="password" id="regPass" placeholder="Contraseña (min. 4 car.)">
      <button class="btn-principal" onclick="ejecutarRegistro()">Registrarme</button>
      <div class="switch-modo">¿Ya tienes cuenta? <a onclick="cambiarVista(false)">Iniciar sesión</a></div>
    </div>
  </div>

  <!-- PANTALLA DE LA APP -->
  <div id="vistaApp" class="oculto">
    <div class="topbar">
      <div>
        <strong id="appNombreTienda">Tienda</strong> | 
        <span id="appUser">Usuario</span>
      </div>
      <button onclick="cerrarSesion()" style="background:none; border:1px solid red; color:red; cursor:pointer; padding:5px 10px; border-radius:5px;">Salir</button>
    </div>

    <div style="background:white; padding:20px; border-radius:15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
      <h3>📦 Inventario Real</h3>
      <table id="tablaInv">
        <thead>
          <tr><th>Producto</th><th>Categoría</th><th>Stock</th><th>Precio</th></tr>
        </thead>
        <tbody id="bodyInv">
          <tr><td colspan="4">Cargando productos...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // TU URL PERSONALIZADA
    const API_URL = 'https://script.google.com/macros/s/AKfycbxJbfkKfQys_MV7Mh_KcT0AZxBLcaUcgAiEFVuvGBD5IKlejeRKuxMeMSEJtT10VdcK/exec';

    let sesionActual = null;

    // Función principal de comunicación con el Excel
    async function llamarAPI(accion, params = {}, metodo = 'POST') {
      const config = {
        method: 'POST', // Siempre usamos POST para evitar problemas de CORS con Apps Script
        mode: 'cors',
        cache: 'no-cache',
        body: JSON.stringify({ action: accion, ...params })
      };

      // Si es GET, añadimos los parámetros a la URL (Apps Script prefiere esto para lecturas)
      let urlFinal = API_URL;
      if (metodo === 'GET') {
        const query = new URLSearchParams({ action: accion, ...params }).toString();
        urlFinal += `?${query}`;
        delete config.body;
        config.method = 'GET';
      }

      try {
        const res = await fetch(urlFinal, config);
        const texto = await res.text();
        
        try {
          const json = JSON.parse(texto);
          if (!json.ok) throw new Error(json.error);
          return json.data;
        } catch (e) {
          console.error("Respuesta del servidor no es JSON:", texto);
          throw new Error("El servidor envió una respuesta inválida. Revisa el despliegue en Google.");
        }
      } catch (err) {
        throw err;
      }
    }

    // --- ACCIONES DE UI ---

    function cambiarVista(irARegistro) {
      document.getElementById('formLogin').classList.toggle('oculto', irARegistro);
      document.getElementById('formReg').classList.toggle('oculto', !irARegistro);
      document.getElementById('uiSubtitulo').innerText = irARegistro ? 'Crea tu cuenta de vendedor' : 'Ingresa a tu cuenta';
      limpiarMensaje();
    }

    function mostrarMensaje(txt, tipo) {
      const m = document.getElementById('msgAuth');
      m.innerText = txt;
      m.className = `mensaje ${tipo}`;
    }

    function limpiarMensaje() {
      document.getElementById('msgAuth').className = 'mensaje';
    }

    // --- LOGICA DE NEGOCIO ---

    async function ejecutarLogin() {
      const usuario = document.getElementById('logUser').value;
      const password = document.getElementById('logPass').value;
      
      if(!usuario || !password) return mostrarMensaje("Completa los campos", "error");

      try {
        mostrarMensaje("Verificando...", "ok");
        const data = await llamarAPI('login', { usuario, password });
        sesionActual = data;
        entrarAlApp();
      } catch (e) {
        mostrarMensaje(e.message, "error");
      }
    }

    async function ejecutarRegistro() {
      const nombre = document.getElementById('regNom').value;
      const usuario = document.getElementById('regUser').value;
      const password = document.getElementById('regPass').value;

      if(!nombre || !usuario || !password) return mostrarMensaje("Faltan datos", "error");

      try {
        mostrarMensaje("Creando cuenta...", "ok");
        await llamarAPI('registrarUsuario', { nombre, usuario, password });
        mostrarMensaje("Cuenta creada. Ya puedes iniciar sesión.", "ok");
        cambiarVista(false);
      } catch (e) {
        mostrarMensaje(e.message, "error");
      }
    }

    function entrarAlApp() {
      document.getElementById('vistaAuth').classList.add('oculto');
      document.getElementById('vistaApp').classList.remove('oculto');
      document.getElementById('appUser').innerText = sesionActual.nombre;
      document.getElementById('appNombreTienda').innerText = document.getElementById('uiNombreTienda').innerText;
      cargarInventario();
    }

    async function cargarInventario() {
      try {
        const productos = await llamarAPI('getInventario', {}, 'GET');
        const body = document.getElementById('bodyInv');
        body.innerHTML = '';

        if(productos.length === 0) {
          body.innerHTML = '<tr><td colspan="4">No hay productos en la hoja "Inventario"</td></tr>';
          return;
        }

        productos.forEach(p => {
          const row = `<tr>
            <td>${p.producto}</td>
            <td>${p.categoria || '-'}</td>
            <td style="color: ${p.stock <= p.stockMinimo ? 'red' : 'black'}">${p.stock}</td>
            <td>$${p.precio}</td>
          </tr>`;
          body.innerHTML += row;
        });
      } catch (e) {
        console.error(e);
      }
    }

    function cerrarSesion() {
      location.reload();
    }

    // Al cargar la página, traer configuración visual
    window.onload = async () => {
      try {
        const config = await llamarAPI('getConfigPublica', {}, 'GET');
        document.getElementById('uiNombreTienda').innerText = config.nombreEmpresa;
        if(config.logoUrl) document.getElementById('logoImg').src = config.logoUrl;
      } catch (e) {
        console.log("Error inicial:", e);
      }
    };
  </script>
</body>
</html>
