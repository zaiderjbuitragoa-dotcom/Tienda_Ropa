<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema POS - Mi Tienda de Ropa</title>
  <style>
    :root { --rosa: #f7a8c4; --rosa-oscuro: #e0729e; --blanco: #ffffff; --gris: #8a8a8a; --fondo: #fff5f8; }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--fondo); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #333; }
    .auth-card { background: var(--blanco); border-radius: 20px; padding: 36px 30px; box-shadow: 0 10px 40px rgba(224, 114, 158, 0.18); text-align: center; width: 100%; max-width: 380px; }
    .logo-box { width: 96px; height: 96px; margin: 0 auto 16px; border-radius: 50%; background: var(--fondo); border: 3px solid var(--rosa); display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 40px; }
    .logo-box img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 20px; margin: 4px 0; color: var(--rosa-oscuro); font-weight: 700; }
    .subtitulo { font-size: 13px; color: var(--gris); margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1.5px solid #f0d5e0; border-radius: 10px; outline: none; }
    .btn-principal { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--rosa), var(--rosa-oscuro)); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .mensaje { font-size: 13px; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; text-align: left; }
    .error { background: #fde5ec; color: #c0447a; display: block; }
    .ok { background: #e6f7ea; color: #2a8a4a; display: block; }
    .oculto { display: none; }
    .switch-modo { margin-top: 15px; font-size: 13px; color: var(--gris); }
    .switch-modo a { color: var(--rosa-oscuro); text-decoration: none; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

  <div id="vistaAuth" class="auth-card">
    <div class="logo-box" id="logoContenedor">👗</div>
    <h1 id="uiNombreTienda">Cargando Tienda...</h1>
    <div class="subtitulo" id="uiSubtitulo">Por favor espera...</div>

    <div id="msgAuth" class="mensaje"></div>

    <div id="formLogin" class="oculto">
      <input type="text" id="logUser" placeholder="Usuario">
      <input type="password" id="logPass" placeholder="Contraseña">
      <button class="btn-principal" onclick="ejecutarLogin()">Ingresar</button>
      <div class="switch-modo">¿No tienes cuenta? <a onclick="cambiarVista(true)">Crear usuario</a></div>
    </div>

    <div id="formReg" class="oculto">
      <input type="text" id="regNom" placeholder="Nombre completo">
      <input type="text" id="regUser" placeholder="Nombre de usuario">
      <input type="password" id="regPass" placeholder="Contraseña">
      <button class="btn-principal" onclick="ejecutarRegistro()">Registrarme</button>
      <div class="switch-modo">¿Ya tienes cuenta? <a onclick="cambiarVista(false)">Iniciar sesión</a></div>
    </div>
  </div>

  <script>
    // URL DE TU SCRIPT
    const API_URL = 'https://script.google.com/macros/s/AKfycbwF0T4dFM_SbfCxq6dBBSdQBL_xP2R64RZFJW-ly0AGiEWuRvVrIHXV7AQ2WrchaT_W/exec';

    async function llamarAPI(accion, params = {}, metodo = 'POST') {
      let url = API_URL;
      let opciones = { method: 'POST', mode: 'cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' } };
      const cuerpo = { action: accion, ...params };
      if (metodo === 'GET') { url += `?${new URLSearchParams(cuerpo).toString()}`; opciones.method = 'GET'; } 
      else { opciones.body = JSON.stringify(cuerpo); }

      try {
        const res = await fetch(url, opciones);
        const texto = await res.text();
        const json = JSON.parse(texto);
        if (!json.ok) throw new Error(json.error);
        return json.data;
      } catch (err) {
        console.error("Error API:", err);
        throw err;
      }
    }

    function cambiarVista(irARegistro) {
      document.getElementById('formLogin').classList.toggle('oculto', irARegistro);
      document.getElementById('formReg').classList.toggle('oculto', !irARegistro);
      document.getElementById('uiSubtitulo').innerText = irARegistro ? 'Crea tu cuenta de vendedor' : 'Ingresa a tu cuenta';
    }

    window.onload = async () => {
      try {
        const config = await llamarAPI('getConfigPublica', {}, 'GET');
        document.getElementById('uiNombreTienda').innerText = config.nombreEmpresa;
        document.getElementById('uiSubtitulo').innerText = 'Ingresa a tu cuenta';
        document.getElementById('formLogin').classList.remove('oculto');
        if(config.logoUrl) document.getElementById('logoContenedor').innerHTML = `<img src="${config.logoUrl}">`;
      } catch (e) {
        document.getElementById('uiNombreTienda').innerText = "Error de Conexión";
        document.getElementById('uiSubtitulo').innerText = "Revisa la configuración de Google Sheets";
        const m = document.getElementById('msgAuth');
        m.innerText = "No se pudo conectar con el servidor. ¿Ejecutaste 'setupSheets' en el editor de Google?";
        m.className = "mensaje error";
      }
    };

    async function ejecutarLogin() { /* ... igual que antes ... */ }
    async function ejecutarRegistro() { /* ... igual que antes ... */ }
  </script>
</body>
</html>
