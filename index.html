<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema POS - Mi Tienda de Ropa</title>
  <style>
    :root {
      --rosa: #f7a8c4;
      --rosa-oscuro: #e0729e;
      --blanco: #ffffff;
      --gris: #8a8a8a;
      --fondo: #fff5f8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0; background: var(--fondo);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #333;
    }

    .auth-card {
      background: var(--blanco); border-radius: 20px; padding: 36px 30px;
      box-shadow: 0 10px 40px rgba(224, 114, 158, 0.18);
      text-align: center; width: 100%; max-width: 380px;
    }

    .logo-box {
      width: 96px; height: 96px; margin: 0 auto 16px; border-radius: 50%;
      background: var(--fondo); border: 3px solid var(--rosa);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .logo-box img { width: 100%; height: 100%; object-fit: cover; }
    
    h1 { font-size: 20px; margin: 4px 0; color: var(--rosa-oscuro); font-weight: 700; }
    .subtitulo { font-size: 13px; color: var(--gris); margin-bottom: 20px; }

    input {
      width: 100%; padding: 12px; margin-bottom: 12px;
      border: 1.5px solid #f0d5e0; border-radius: 10px; outline: none;
    }
    input:focus { border-color: var(--rosa-oscuro); }

    .btn-principal {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--rosa), var(--rosa-oscuro));
      color: white; border: none; border-radius: 10px;
      font-weight: 600; cursor: pointer;
    }
    .btn-principal:disabled { opacity: 0.6; cursor: not-allowed; }

    .mensaje {
      font-size: 13px; padding: 10px; border-radius: 8px;
      margin-bottom: 15px; display: none; text-align: left;
    }
    .error { background: #fde5ec; color: #c0447a; display: block; }
    .ok { background: #e6f7ea; color: #2a8a4a; display: block; }

    .oculto { display: none; }
    .switch-modo { margin-top: 15px; font-size: 13px; color: var(--gris); }
    .switch-modo a { color: var(--rosa-oscuro); text-decoration: none; font-weight: 600; cursor: pointer; }

    /* DASHBOARD */
    #vistaApp { max-width: 900px; width: 95%; margin: 20px; }
    .topbar {
      background: white; padding: 15px; border-radius: 15px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .tabla-contenedor { background: white; padding: 20px; border-radius: 15px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
    th { color: var(--gris); font-weight: 600; text-transform: uppercase; font-size: 11px; }
  </style>
</head>
<body>

  <!-- PANTALLA DE LOGIN / REGISTRO -->
  <div id="vistaAuth" class="auth-card">
    <div class="logo-box">
      <img id="logoImg" src="https://via.placeholder.com/100?text=👗" alt="Logo">
    </div>
    <h1 id="uiNombreTienda">Mi Tienda de Ropa</h1>
    <div class="subtitulo" id="uiSubtitulo">Ingresa a tu cuenta</div>

    <div id="msgAuth" class="mensaje"></div>

    <!-- Formulario Login -->
    <div id="formLogin">
      <input type="text" id="logUser" placeholder="Usuario">
      <input type="password" id="logPass" placeholder="Contraseña">
      <button class="btn-principal" id="btnLog" onclick="ejecutarLogin()">Ingresar</button>
      <div class="switch-modo">¿No tienes cuenta? <a onclick="cambiarVista(true)">Crear usuario</a></div>
    </div>

    <!-- Formulario Registro -->
    <div id="formReg" class="oculto">
      <input type="text" id="regNom" placeholder="Nombre completo">
      <input type="text" id="regUser" placeholder="Nombre de usuario">
      <input type="password" id="regPass" placeholder="Contraseña (mín. 4 car.)">
      <button class="btn-principal" id="btnReg" onclick="ejecutarRegistro()">Crear cuenta</button>
      <div class="switch-modo">¿Ya tienes cuenta? <a onclick="cambiarVista(false)">Iniciar sesión</a></div>
    </div>
  </div>

  <!-- PANTALLA DE LA APP -->
  <div id="vistaApp" class="oculto">
    <div class="topbar">
      <div>
        <strong id="appNombreTienda" style="color: var(--rosa-oscuro);">Tienda</strong> | 
        <span id="appUser" style="font-size: 13px; color: var(--gris);">Usuario</span>
      </div>
      <button onclick="location.reload()" style="background:none; border:1px solid var(--rosa-oscuro); color:var(--rosa-oscuro); cursor:pointer; padding:6px 12px; border-radius:8px; font-size: 12px; font-weight: 600;">Cerrar Sesión</button>
    </div>

    <div class="tabla-contenedor">
      <h3 style="margin-top: 0; color: var(--rosa-oscuro);">📦 Inventario Actual</h3>
      <table id="tablaInv">
        <thead>
          <tr><th>Producto</th><th>Categoría</th><th>Stock</th><th>Precio</th></tr>
        </thead>
        <tbody id="bodyInv">
          <tr><td colspan="4">Cargando inventario...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // TU URL ACTUALIZADA
    const API_URL = 'https://script.google.com/macros/s/AKfycbwF0T4dFM_SbfCxq6dBBSdQBL_xP2R64RZFJW-ly0AGiEWuRvVrIHXV7AQ2WrchaT_W/exec';

    let sesionActual = null;

    /**
     * Comunicación con Google Apps Script.
     * Usamos 'text/plain' para evitar errores de preflight/CORS de Google.
     */
    async function llamarAPI(accion, params = {}, metodo = 'POST') {
      let url = API_URL;
      let opciones = {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      };

      const cuerpo = { action: accion, ...params };

      if (metodo === 'GET') {
        const query = new URLSearchParams(cuerpo).toString();
        url += `?${query}`;
        delete opciones.headers;
        opciones.method = 'GET';
      } else {
        opciones.body = JSON.stringify(cuerpo);
      }

      try {
        const res = await fetch(url, opciones);
        const texto = await res.text();
        
        let json;
        try {
          json = JSON.parse(texto);
        } catch (e) {
          console.error("Respuesta no es JSON:", texto);
          throw new Error("El servidor de Google devolvió un error (HTML). Verifica que el script esté publicado como 'Cualquier persona'.");
        }

        if (!json.ok) throw new Error(json.error || "Error desconocido en el servidor");
        return json.data;
      } catch (err) {
        console.error("Error en llamarAPI:", err);
        throw err;
      }
    }

    // --- INTERFAZ ---

    function cambiarVista(irARegistro) {
      document.getElementById('formLogin').classList.toggle('oculto', irARegistro);
      document.getElementById('formReg').classList.toggle('oculto', !irARegistro);
      document.getElementById('uiSubtitulo').innerText = irARegistro ? 'Crea tu cuenta de vendedor' : 'Ingresa a tu cuenta';
      document.getElementById('msgAuth').className = 'mensaje';
    }

    function mostrarMensaje(txt, tipo) {
      const m = document.getElementById('msgAuth');
      m.innerText = txt;
      m.className = `mensaje ${tipo}`;
    }

    // --- LÓGICA ---

    async function ejecutarLogin() {
      const usuario = document.getElementById('logUser').value.trim();
      const password = document.getElementById('logPass').value;
      const btn = document.getElementById('btnLog');

      if(!usuario || !password) return mostrarMensaje("Escribe usuario y contraseña", "error");

      try {
        btn.disabled = true;
        mostrarMensaje("Validando...", "ok");
        const data = await llamarAPI('login', { usuario, password });
        sesionActual = data;
        entrarAlApp();
      } catch (e) {
        mostrarMensaje(e.message, "error");
      } finally {
        btn.disabled = false;
      }
    }

    async function ejecutarRegistro() {
      const nombre = document.getElementById('regNom').value.trim();
      const usuario = document.getElementById('regUser').value.trim();
      const password = document.getElementById('regPass').value;
      const btn = document.getElementById('btnReg');

      if(!nombre || !usuario || !password) return mostrarMensaje("Completa todos los campos", "error");

      try {
        btn.disabled = true;
        mostrarMensaje("Registrando...", "ok");
        await llamarAPI('registrarUsuario', { nombre, usuario, password });
        mostrarMensaje("¡Cuenta creada! Ya puedes iniciar sesión.", "ok");
        setTimeout(() => cambiarVista(false), 2000);
      } catch (e) {
        mostrarMensaje(e.message, "error");
      } finally {
        btn.disabled = false;
      }
    }

    function entrarAlApp() {
      document.getElementById('vistaAuth').classList.add('oculto');
      document.getElementById('vistaApp').classList.remove('oculto');
      document.getElementById('appUser').innerText = sesionActual.nombre;
      document.getElementById('appNombreTienda').innerText = document.getElementById('uiNombreTienda').innerText;
      cargarInventario();
    }

    async function cargarInventario() {
      try {
        const productos = await llamarAPI('getInventario', {}, 'GET');
        const body = document.getElementById('bodyInv');
        body.innerHTML = '';

        if(!productos || productos.length === 0) {
          body.innerHTML = '<tr><td colspan="4">Inventario vacío. Agregue productos en el Excel.</td></tr>';
          return;
        }

        productos.forEach(p => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${p.producto}</td>
            <td>${p.categoria || '-'}</td>
            <td style="color: ${p.stock <= p.stockMinimo ? 'red' : 'inherit'}; font-weight: ${p.stock <= p.stockMinimo ? 'bold' : 'normal'}">${p.stock}</td>
            <td>$${p.precio}</td>
          `;
          body.appendChild(row);
        });
      } catch (e) {
        console.error("Error cargando inventario:", e);
      }
    }

    // Al iniciar, cargar configuración de la tienda
    window.onload = async () => {
      try {
        const config = await llamarAPI('getConfigPublica', {}, 'GET');
        if(config.nombreEmpresa) {
          document.getElementById('uiNombreTienda').innerText = config.nombreEmpresa;
        }
        if(config.logoUrl) {
          document.getElementById('logoImg').src = config.logoUrl;
        }
      } catch (e) {
        console.warn("No se pudo cargar la configuración inicial (posiblemente hojas vacías).");
      }
    };
  </script>
</body>
</html>
