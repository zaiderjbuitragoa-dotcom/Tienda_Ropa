<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel · Sosibé Boutique</title>
  <style>
    :root {
      --rosa: #f7a8c4;
      --rosa-oscuro: #e0729e;
      --blanco: #ffffff;
      --gris: #8a8a8a;
      --fondo: #fff5f8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0; background: var(--fondo); color: #333;
    }
    .contenedor { max-width: 1000px; width: 95%; margin: 20px auto; }

    .topbar {
      background: white; padding: 15px 20px; border-radius: 15px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex-wrap: wrap; gap: 10px;
    }
    .marca { display: flex; align-items: center; gap: 10px; }
    .marca img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; }
    .marca strong { color: var(--rosa-oscuro); }
    .btn-salir {
      background: none; border: 1px solid #e05555; color: #e05555; cursor: pointer;
      padding: 8px 14px; border-radius: 8px; font-weight: 600;
    }

    nav.tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 4px; }
    nav.tabs a {
      flex: none; text-decoration: none; color: var(--rosa-oscuro); background: white;
      padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 2px solid transparent;
    }
    nav.tabs a.activo { border-color: var(--rosa-oscuro); background: var(--rosa); color: white; }

    .modulos {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px; margin-bottom: 25px;
    }
    .modulo-card {
      background: white; border-radius: 16px; padding: 22px 16px; text-align: center;
      text-decoration: none; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: 0.15s; border: 2px solid transparent;
    }
    .modulo-card:hover { transform: translateY(-3px); border-color: var(--rosa); }
    .modulo-icono { font-size: 32px; margin-bottom: 8px; }
    .modulo-nombre { font-weight: 700; color: var(--rosa-oscuro); font-size: 14px; }

    .resumen { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .stat-card { background: white; border-radius: 15px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .stat-card .valor { font-size: 22px; font-weight: 700; color: var(--rosa-oscuro); }
    .stat-card .label { font-size: 12px; color: var(--gris); text-transform: uppercase; margin-top: 4px; }

    h2.seccion { font-size: 15px; color: var(--rosa-oscuro); margin: 0 0 10px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
    th { color: var(--rosa-oscuro); font-size: 11px; text-transform: uppercase; background: #fdf1f5; }
    .badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-bajo { background: #fde5ec; color: #c0447a; }
    .badge-ok { background: #e6f7ea; color: #2a8a4a; }
    .cargando { text-align: center; padding: 20px; color: var(--gris); font-size: 13px; }
  </style>
</head>

    const NOMBRE_POR_DEFECTO = 'Sosibé Boutique';

    async function api(accion, params = {}, metodo = 'POST') {
      const url = metodo === 'GET' ? `${API_URL}?action=${accion}&${new URLSearchParams(params)}` : API_URL;
      const config = {
        method: metodo,
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: metodo === 'GET' ? undefined : JSON.stringify({ action: accion, ...params })
      };
      const res = await fetch(url, config);
      const json = await res.json();
      if (!json.ok) throw new Error(json.error);
      return json.data;
    }

    function cerrarSesion() {
      const token = localStorage.getItem('pos_token');
      if (token) api('logoutSesion', { token }).catch(() => {});
      localStorage.removeItem('pos_token');
      localStorage.removeItem('pos_usuario');
      window.location.href = 'index.html';
    }

    async function requerirSesion() {
      const token = localStorage.getItem('pos_token');
      if (!token) { window.location.href = 'index.html'; return null; }
      try {
        const sesion = await api('validarSesion', { token }, 'GET');
        document.getElementById('appUser').innerText = `${sesion.nombre} (${sesion.rol})`;
        return sesion;
      } catch (e) {
        localStorage.removeItem('pos_token');
        localStorage.removeItem('pos_usuario');
        window.location.href = 'index.html';
        return null;
      }
    }

    async function cargarConfig() {
      try {
        const config = await api('getConfigPublica', {}, 'GET');
        document.getElementById('appTienda').innerText = config.nombreEmpresa || NOMBRE_POR_DEFECTO;
        const img = document.getElementById('logoImg');
        img.src = config.logoUrl || LOGO_POR_DEFECTO;
      } catch (e) {
        console.error(e);
        document.getElementById('appTienda').innerText = NOMBRE_POR_DEFECTO;
      }
    }

    async function cargarInv() {
      try {
        const data = await api('getInventario', {}, 'GET');
        const activos = data.filter(p => p.estado !== 'Inactivo');
        const stockBajo = activos.filter(p => Number(p.stock) <= Number(p.stockMinimo));
        const valorInventario = activos.reduce((s, p) => s + Number(p.stock) * Number(p.precio), 0);

        // Separados activos y por vencer (próximos 3 días), para tener visibilidad desde el Panel
        let separadosActivos = 0, separadosPorVencer = 0;
        try {
          const separados = await api('getSeparados', {}, 'GET');
          const hoy = new Date(); hoy.setHours(0,0,0,0);
          const activosSep = separados.filter(s => s.estado === 'Activo' || s.estado === 'Pagado');
          separadosActivos = activosSep.length;
          separadosPorVencer = activosSep.filter(s => {
            if (!s.fechaLimite) return false;
            const dias = Math.round((new Date(s.fechaLimite + 'T00:00:00') - hoy) / 86400000);
            return dias <= 3;
          }).length;
        } catch (e) { console.error('Error cargando separados:', e); }

        document.getElementById('resumenStats').innerHTML = `
          <div class="stat-card"><div class="valor">${activos.length}</div><div class="label">Productos activos</div></div>
          <div class="stat-card"><div class="valor">${stockBajo.length}</div><div class="label">Con stock bajo</div></div>
          <div class="stat-card"><div class="valor">$${valorInventario.toLocaleString('es-CO')}</div><div class="label">Valor en inventario</div></div>
          <div class="stat-card"><div class="valor">${separadosActivos}</div><div class="label">Separados activos</div></div>
          <div class="stat-card"><div class="valor">${separadosPorVencer}</div><div class="label">Separados por vencer</div></div>
        `;

        const b = document.getElementById('listaInv');
        if (activos.length === 0) {
          b.innerHTML = '<tr><td colspan="5" class="cargando">Aún no hay productos. Agrégalos desde el módulo Inventario.</td></tr>';
          return;
        }
        b.innerHTML = activos.slice(-8).reverse().map(p => {
          const bajo = Number(p.stock) <= Number(p.stockMinimo);
          return `<tr>
            <td>${p.nombre}</td>
            <td>${p.categoria || '-'}</td>
            <td><span class="badge ${bajo ? 'badge-bajo' : 'badge-ok'}">${p.stock}</span></td>
            <td>$${Number(p.precio).toLocaleString('es-CO')}</td>
            <td>${p.estado || 'Activo'}</td>
          </tr>`;
        }).join('');
      } catch (e) {
        document.getElementById('listaInv').innerHTML = `<tr><td colspan="5" class="cargando">Error cargando inventario: ${e.message}</td></tr>`;
      }
    }

    window.onload = async () => {
      const sesion = await requerirSesion();
      if (!sesion) return;
      await cargarConfig();
      await cargarInv();
    };
  </script>
